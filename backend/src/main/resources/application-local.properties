# ===============================
# LOCAL DEV PROFILE — Local MySQL
# Run backend with: .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=local
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/premiumadventure?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=local-dev-secret-key-minimum-32-characters-long-hs256
jwt.expiration=86400000

server.port=8080

razorpay.key.id=
razorpay.key.secret=

cors.allowed.origins=http://localhost:5173,http://localhost:3000
